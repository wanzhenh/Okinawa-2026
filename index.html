<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>沖繩盛夏・五天四夜慢活之旅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f0f7f9; 
      -webkit-tap-highlight-color: transparent;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    
    @keyframes scaleUp {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-scale-up {
      animation: scaleUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-[#f0f7f9] flex justify-center min-h-screen">

  <div id="app" class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col relative overflow-x-hidden pb-12">
    
    <div class="h-[250px] w-full relative bg-[#0077b6]">
      <img src="image_ff7048.jpeg" alt="Okinawa Summer" class="w-full h-full object-cover onerror-fallback" onerror="this.style.display='none'">
      <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/20"></div>
      
      <div class="absolute left-5 top-8 text-white z-10">
        <h1 class="text-2xl font-bold tracking-widest drop-shadow-md">OKINAWA</h1>
        <p class="text-xs font-light tracking-wider opacity-90 mt-1">2026/07/12 - 07/16 盛夏極簡行</p>
      </div>

      <div class="absolute bottom-10 right-4 flex space-x-2 z-20 bg-white/80 backdrop-blur-md rounded-2xl p-1.5 shadow-lg border border-white/40">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-map-location-dot text-lg"></i></button>
        <button @click="activeTab = 'info'" :class="activeTab === 'info' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-circle-info text-lg"></i></button>
        <button @click="activeTab = 'shopping'" :class="activeTab === 'shopping' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-basket-shopping text-lg"></i></button>
        <button @click="activeTab = 'expenses'" :class="activeTab === 'expenses' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-coins text-lg"></i></button>
      </div>
    </div>

    <main class="-mt-8 rounded-t-[32px] bg-[#f0f7f9] flex-1 z-20 px-4 pt-6 relative pb-24">
      
      <div v-if="activeTab === 'itinerary'">
        <div class="flex space-x-3 overflow-x-auto pb-4 no-scrollbar scroll-smooth snap-x">
          <button v-for="(day, index) in days" :key="index" @click="selectedDayIdx = index" :class="selectedDayIdx === index ? 'bg-[#0077b6] text-white shadow-md transform scale-105' : 'bg-white text-slate-700'" class="flex-shrink-0 w-[64px] py-2.5 rounded-2xl flex flex-col items-center justify-center snap-center transition-all duration-200 border border-slate-100">
            <span class="text-xs font-medium uppercase tracking-wider block" :class="selectedDayIdx === index ? 'text-sky-200' : 'text-slate-400'">{{ day.week }}</span>
            <span class="text-lg font-bold mt-0.5 block">{{ day.date }}</span>
          </button>
        </div>

        <div class="bg-gradient-to-r from-sky-400/20 to-blue-400/10 rounded-2xl p-4 mb-5 border border-sky-200/50 flex items-center justify-between">
          <div class="flex items-center space-x-3">
            <i class="fa-solid fa-cloud-sun text-3xl text-amber-500 animate-pulse"></i>
            <div>
              <p class="text-xs text-slate-500 font-medium">那霸市今日天氣</p>
              <p class="text-sm font-semibold text-slate-800">盛夏晴朗、紫外線強</p>
            </div>
          </div>
          <div class="text-right">
            <span class="text-2xl font-bold text-[#0077b6]">31°C</span>
            <p class="text-[11px] text-slate-400">體感溫度 34°C</p>
          </div>
        </div>

        <div class="space-y-4 pl-4 relative before:absolute before:top-6 before:bottom-0 before:left-[21px] before:w-0.5 before:bg-[#d6d2f3]">
          <div v-for="(item, idx) in currentDayItinerary" :key="item.id" class="relative pl-6 group">
            <div class="absolute left-[-2.5px] top-6 w-2 h-2 rounded-full bg-[#8272e2] shadow-[0_0_0_4px_#f0f7f9] z-10"></div>
            
            <div v-if="item.category === '航班'" class="bg-gradient-to-br from-indigo-900 to-slate-800 text-indigo-100 rounded-2xl p-4 shadow-sm relative overflow-hidden">
              <div class="absolute right-[-15px] bottom-[-15px] opacity-10 text-7xl transform -rotate-12"><i class="fa-solid fa-plane"></i></div>
              <div class="flex justify-between items-center border-b border-indigo-700/50 pb-2 mb-3">
                <span class="px-2 py-0.5 bg-indigo-500/30 text-indigo-300 rounded text-[10px] uppercase font-bold tracking-widest">{{ item.flightNum || '航班' }}</span>
                <span class="text-xs text-indigo-300 font-bold">{{ item.hours || '' }}</span>
              </div>
              <h3 class="font-bold text-white text-
