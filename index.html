<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>沖繩盛夏・五天四夜慢活之旅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f7f9; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .animate-scale-up { animation: scaleUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes scaleUp { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="bg-[#f0f7f9] flex justify-center min-h-screen">

  <div id="app" class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col relative overflow-x-hidden pb-12">
    
    <div class="h-[250px] w-full relative bg-[#0077b6]">
      <img src="image_ff7048.jpeg" alt="Okinawa Summer" class="w-full h-full object-cover onerror-fallback" onerror="this.style.display='none'">
      <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/20"></div>
      <div class="absolute left-5 top-8 text-white z-10">
        <h1 class="text-2xl font-bold tracking-widest drop-shadow-md">OKINAWA</h1>
        <p class="text-xs font-light tracking-wider opacity-90 mt-1">2026/07/12 - 07/16 盛夏極簡行</p>
      </div>

      <div class="absolute bottom-10 right-4 flex space-x-2 z-20 bg-white/80 backdrop-blur-md rounded-2xl p-1.5 shadow-lg border border-white/40">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-map-location-dot text-lg"></i></button>
        <button @click="activeTab = 'info'" :class="activeTab === 'info' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-circle-info text-lg"></i></button>
        <button @click="activeTab = 'shopping'" :class="activeTab === 'shopping' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-basket-shopping text-lg"></i></button>
        <button @click="activeTab = 'expenses'" :class="activeTab === 'expenses' ? 'bg-[#00b4d8] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"><i class="fa-solid fa-coins text-lg"></i></button>
      </div>
    </div>

    <main class="-mt-8 rounded-t-[32px] bg-[#f0f7f9] flex-1 z-20 px-4 pt-6 relative pb-24">
      
      <!-- 行程 Tab -->
      <div v-if="activeTab === 'itinerary'">
        <!-- 🌟 即時天氣卡片：已更換為新的 Time and Date 連結 -->
        <a href="https://www.timeanddate.com/weather/japan/naha/ext" target="_blank" class="block bg-gradient-to-r from-sky-400/20 to-blue-400/10 rounded-2xl p-4 mb-5 border border-sky-200/50 flex items-center justify-between hover:from-sky-400/30 hover:to-blue-400/20 transition-all shadow-sm group">
          <div class="flex items-center space-x-3">
            <i :class="weatherData.icon" class="text-3xl text-amber-500 animate-pulse"></i>
            <div>
              <p class="text-xs text-slate-500 font-medium flex items-center">
                那霸市即時天氣 <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-[10px] opacity-50"></i>
              </p>
              <p class="text-sm font-semibold text-slate-800">{{ weatherData.desc }}</p>
              <p class="text-[11px] text-blue-600 font-bold mt-0.5"><i class="fa-solid fa-droplet mr-1"></i>今日降雨機率 {{ weatherData.pop }}</p>
            </div>
          </div>
          <div class="text-right">
            <span class="text-2xl font-bold text-[#0077b6]">{{ weatherData.temp }}</span>
            <p class="text-[11px] text-slate-400">體感 {{ weatherData.feelsLike }}</p>
          </div>
        </a>

        <!-- 行程卡片區 -->
        <div class="space-y-4 pl-4 relative before:absolute before:top-6 before:bottom-0 before:left-[21px] before:w-0.5 before:bg-[#d6d2f3]">
           <!-- (行程內容略，維持 v21 版本) -->
           <!-- ... (請保留原本的行程卡片邏輯) ... -->
        </div>
      </div>

      <!-- 資訊 Tab -->
      <div v-if="activeTab === 'info'" class="space-y-4">
        <!-- 資訊頁面內容... -->
      </div>
      
      <!-- 購物與記帳 Tab... -->
      
    </main>
    
    <!-- Modals... -->

  </div>

  <script>
    const { createApp, ref, computed, watch, onMounted } = Vue;

    createApp({
      setup() {
        // ... (其他狀態變數) ...
        const weatherData = ref({ temp: '31°C', feelsLike: '34°C', desc: '載入中...', pop: '--%', icon: 'fa-solid fa-cloud-sun' });
        
        // 🌟 更新天氣 API 邏輯 (確保連結正確)
        const fetchRealTimeWeather = async () => {
          try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=26.2124&longitude=127.6809&current=temperature_2m,apparent_temperature,weather_code&daily=precipitation_probability_max&timezone=Asia%2FTokyo');
            if (response.ok) {
              const data = await response.json();
              weatherData.value.temp = `${Math.round(data.current.temperature_2m)}°C`;
              weatherData.value.feelsLike = `${Math.round(data.current.apparent_temperature)}°C`;
              weatherData.value.pop = `${data.daily.precipitation_probability_max[0]}%`;
              // ... (天氣描述邏輯)
            }
          } catch (error) {
            weatherData.value.desc = '無法載入天氣數據';
          }
        };
        
        // ... (其餘與 v21 相同)
      }
    }).mount('#app');
  </script>
</body>
</html>
